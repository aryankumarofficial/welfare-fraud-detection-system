name: Build and Push Docker Images

on:
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Web Image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/web -f apps/web/Dockerfile .
          docker push ghcr.io/${{ github.repository }}/web

      - name: Build ML Image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/ml ./services/ml
          docker push ghcr.io/${{ github.repository }}/ml
