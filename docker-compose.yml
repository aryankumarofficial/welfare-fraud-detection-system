services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: welfare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d welfare"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: oven/bun:1.3.5
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/welfare
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "bun install && bun run db:migrate"
    restart: "no"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  ml-service:
    build:
      context: ./services/ml
    container_name: ml-service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/welfare
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  api:
    build:
      context: ./apps/api
    container_name: api
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/welfare
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      ml-service:
        condition: service_started

  admin:
    build:
      context: ./apps/admin
    container_name: admin
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
