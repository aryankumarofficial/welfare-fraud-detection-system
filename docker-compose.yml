version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: welfare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  ml-service:
    build:
      context: ./services/ml
    container_name: ml-service
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  api:
    build:
      context: ./apps/api
    container_name: api
    ports:
      - "3001:3000"
    depends_on:
      - postgres
      - redis
      - ml-service

  admin:
    build:
      context: ./apps/admin
    container_name: admin
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
