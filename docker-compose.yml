services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: welfare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d welfare"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: oven/bun:1.3.5
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/welfare
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "bun install && bun run db:migrate"
    restart: "no"

  csv-importer:
    image: oven/bun:1.3.5
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/welfare
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: sh -c "bun install && bun run import:csv"
    restart: "no"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  ml-service:
    build:
      context: ./services/ml
    container_name: ml-service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/welfare
      PREDICTION_QUEUE_API_URL: http://prediction-queue:8010
      JWT_SECRET_KEY: "change-me"
      INTERNAL_API_KEY: "internal-change-me"
      QUEUE_API_KEY: "queue-change-me"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "admin"
      ANALYST_USERNAME: "analyst"
      ANALYST_PASSWORD: "analyst"
      OPERATOR_USERNAME: "operator"
      OPERATOR_PASSWORD: "operator"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      csv-importer:
        condition: service_completed_successfully

  prediction-queue:
    image: oven/bun:1.3.5
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8010:8010"
    environment:
      REDIS_URL: redis://redis:6379
      PREDICTION_QUEUE_API_PORT: 8010
      ML_SERVICE_URL: http://ml-service:8000
      QUEUE_API_KEY: "queue-change-me"
    depends_on:
      redis:
        condition: service_started
      ml-service:
        condition: service_started
    command: sh -c "bun install && bun --filter @repo/workers prediction:queue"

  prediction-worker:
    image: oven/bun:1.3.5
    working_dir: /app
    volumes:
      - .:/app
    environment:
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml-service:8000
      INTERNAL_API_KEY: "internal-change-me"
      QUEUE_API_KEY: "queue-change-me"
      PREDICTION_WORKER_CONCURRENCY: 2
    depends_on:
      redis:
        condition: service_started
      ml-service:
        condition: service_started
    command: sh -c "bun install && bun --filter @repo/workers prediction:worker"

  prediction-events:
    image: oven/bun:1.3.5
    working_dir: /app
    volumes:
      - .:/app
    environment:
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml-service:8000
    depends_on:
      redis:
        condition: service_started
      ml-service:
        condition: service_started
    command: sh -c "bun install && bun --filter @repo/workers prediction:events"

  api:
    build:
      context: ./apps/api
    container_name: api
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/welfare
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      ml-service:
        condition: service_started

  web:
    build:
      context: ./apps/web
    container_name: web
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_started

volumes:
  postgres_data:
